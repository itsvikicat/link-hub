<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- VC con cuore - basato sull'immagine originale -->
  <defs>
    <style>
      .vc-text { font-family: 'Arial', 'Helvetica', sans-serif; font-size: 120px; font-weight: 900; fill: #000; }
      .vc-heart { fill: #000; }
    </style>
  </defs>
  
  <!-- Testo VC stilizzato -->
  <text x="100" y="140" text-anchor="middle" class="vc-text">VC</text>
  
  <!-- Cuore posizionato sotto -->
  <path class="vc-heart" d="M 100 70 C 100 60 92 52 82 52 C 72 52 65 60 65 70 C 65 85 85 100 85 100 C 85 100 105 85 105 70 C 105 60 98 52 88 52 C 78 52 70 60 70 70 Z" transform="translate(30, 30)"/>
</svg>