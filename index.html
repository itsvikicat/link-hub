<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Victoria Catroppa, graphic designer. Identità visive, contenuti social e progetti editoriali con un'estetica bold e curata.">
  <meta name="author" content="Victoria Catroppa">
  <meta property="og:title" content="Victoria Catroppa - Graphic Designer">
  <meta property="og:description" content="Identità visive, contenuti social e progetti editoriali con un'estetica bold e curata.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://itsvikicat.github.io/link-hub/">
  <meta property="og:image" content="https://itsvikicat.github.io/link-hub/brand-icon-black.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Victoria Catroppa - Graphic Designer">
  <meta name="twitter:description" content="Identità visive, contenuti social e progetti editoriali con un'estetica bold e curata.">
  <meta name="theme-color" content="#4f277c">

  <title>Victoria Catroppa - Graphic Designer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #141014;
      --paper: #fff;
      --paper-soft: #faf7ff;
      --lilac: #d8c0ff;
      --lilac-hover: #eadcff;
      --lilac-deep: #6f4ba0;
      --line: rgba(23, 19, 29, 0.14);
      --shadow: 0 14px 34px rgba(105, 75, 145, 0.14);
      --transition: 220ms ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      background: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body.dark-mode {
      --ink: #f8f3ed;
      --paper: #141014;
      --paper-soft: #211a2b;
      --lilac: #d8c0ff;
      --lilac-hover: #eadcff;
      --lilac-deep: #f3eaff;
      --line: rgba(248, 243, 237, 0.16);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      background: var(--paper);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      width: 46px;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: color-mix(in srgb, var(--paper-soft) 72%, white);
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform var(--transition), border-color var(--transition), color var(--transition);
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      border-color: var(--lilac);
      color: var(--lilac-deep);
    }

    .container {
      width: min(100%, 620px);
      padding: 44px 22px 28px;
      text-align: center;
      animation: fadeIn 700ms ease-out;
    }

    .brand-logo {
      width: min(72vw, 260px);
      height: auto;
      margin: 0 auto 26px;
      display: block;
    }

    .brand-logo-dark {
      display: none;
    }

    body.dark-mode .brand-logo-light {
      display: none;
    }

    body.dark-mode .brand-logo-dark {
      display: block;
    }

    h1 {
      color: var(--ink);
      font-size: clamp(2.25rem, 7vw, 4.25rem);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 14px;
    }

    .subtitle {
      color: var(--ink);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .subtitle::after {
      content: "";
      width: min(260px, 68vw);
      height: 3px;
      display: block;
      margin: 14px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--lilac), rgba(255, 255, 255, 0));
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 34px 0 28px;
    }

    .btn,
    .contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 58px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border: 1px solid transparent;
      background: var(--lilac);
      color: var(--ink);
      box-shadow: 0 12px 26px rgba(143, 108, 196, 0.18);
    }

    .btn:hover,
    .contact-btn:hover {
      transform: translateY(-3px);
      background: var(--lilac-hover);
      box-shadow: var(--shadow);
    }

    .btn:focus-visible,
    .contact-btn:focus-visible,
    .theme-toggle:focus-visible {
      outline: 3px solid var(--lilac-deep);
      outline-offset: 4px;
    }

    .btn i,
    .contact-btn i {
      font-size: 1.2rem;
    }

    .contact-section {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--paper-soft) 84%, white);
      box-shadow: 0 10px 30px rgba(48, 31, 74, 0.09);
    }

    .contact-section h2 {
      color: var(--ink);
      font-size: 1.12rem;
      margin-bottom: 8px;
      letter-spacing: 0;
    }

    .contact-section p {
      margin: 0 auto 18px;
      max-width: 440px;
      color: color-mix(in srgb, var(--ink) 72%, transparent);
      font-size: 0.94rem;
      line-height: 1.55;
    }

    .contact-btn {
      padding: 13px 22px;
      background: var(--lilac);
      color: var(--ink);
    }

    footer {
      width: min(100%, 640px);
      padding: 0 22px 28px;
      color: color-mix(in srgb, var(--ink) 58%, transparent);
      text-align: center;
      font-size: 0.78rem;
    }

    footer a {
      color: var(--lilac-deep);
      font-weight: 700;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      body {
        justify-content: flex-start;
      }

      .container {
        padding-top: 88px;
      }

      .theme-toggle {
        top: 16px;
        right: 16px;
      }

      .brand-logo {
        width: min(78vw, 230px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Cambia tema" aria-pressed="false">
    <i class="fas fa-moon" aria-hidden="true"></i>
  </button>

  <main class="container">
    <img class="brand-logo brand-logo-light" src="brand-icon-black.png" alt="Vikenike Design">
    <img class="brand-logo brand-logo-dark" src="brand-icon-white.png" alt="Vikenike Design">

    <h1>Victoria Catroppa</h1>
    <p class="subtitle">Graphic Designer</p>

    <div class="links-container" aria-label="Link principali">
      <a href="https://www.instagram.com/osnapitzvikicat/" class="btn" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-instagram" aria-hidden="true"></i> Instagram
      </a>
      <a href="https://www.behance.net/victoricatropp" class="btn" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-behance" aria-hidden="true"></i> Behance
      </a>
      <a href="https://www.linkedin.com/in/victoria-catroppa-08a5a2292/" class="btn" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-linkedin" aria-hidden="true"></i> LinkedIn
      </a>
    </div>

    <section class="contact-section" aria-labelledby="contact-title">
      <h2 id="contact-title">Parliamo del tuo prossimo progetto</h2>
      <p>Disponibile per brand identity, social kit, layout editoriali e collaborazioni creative.</p>
      <a href="mailto:victoriacatroppa@gmail.com" class="contact-btn">
        <i class="fas fa-envelope" aria-hidden="true"></i> Scrivimi
      </a>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Victoria Catroppa. Tutti i diritti riservati. | <a href="https://github.com/itsvikicat" target="_blank" rel="noopener noreferrer">GitHub</a></p>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme');

    function setTheme(theme) {
      const isDark = theme === 'dark';
      body.classList.toggle('dark-mode', isDark);
      themeToggle.setAttribute('aria-pressed', String(isDark));
      themeToggle.innerHTML = isDark
        ? '<i class="fas fa-sun" aria-hidden="true"></i>'
        : '<i class="fas fa-moon" aria-hidden="true"></i>';
      localStorage.setItem('theme', theme);
    }

    setTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

    themeToggle.addEventListener('click', () => {
      setTheme(body.classList.contains('dark-mode') ? 'light' : 'dark');
    });
  </script>
</body>
</html>
