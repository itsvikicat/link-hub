<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victoria Catroppa</title>

  <!-- Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome per le icone social -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f1ff 0%, #f0e6ff 50%, #ede0ff 100%);
      position: relative;
      overflow-x: hidden;
    }

    /* Effetto background sottile */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(200, 162, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(94, 44, 165, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
      color: #5e2ca5;
      font-weight: 700;
      letter-spacing: -0.5px;
      animation: fadeIn 0.8s ease-out 0.1s both;
    }

    .subtitle {
      font-size: 16px;
      color: #8b6ba8;
      margin-bottom: 40px;
      font-weight: 400;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 40px;
      min-width: 260px;
      background: linear-gradient(135deg, #c8a2ff 0%, #d4b3ff 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 18px;
      border-radius: 30px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      box-shadow: 0 8px 16px rgba(94, 44, 165, 0.15);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.6s ease-out backwards;
    }

    .btn:nth-child(1) { animation-delay: 0.3s; }
    .btn:nth-child(2) { animation-delay: 0.4s; }
    .btn:nth-child(3) { animation-delay: 0.5s; }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn:hover {
      background: linear-gradient(135deg, #e0c9ff 0%, #e8d9ff 100%);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(94, 44, 165, 0.25);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .btn i {
      font-size: 22px;
      transition: transform 0.3s ease;
    }

    .btn:hover i {
      transform: scale(1.15);
    }

    /* Responsive */
    @media (max-width: 480px) {
      h1 {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .subtitle {
        margin-bottom: 30px;
        font-size: 14px;
      }

      .btn {
        min-width: 240px;
        padding: 14px 30px;
        font-size: 16px;
      }

      .links-container {
        gap: 12px;
      }
    }

    /* Footer */
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #a89bc4;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Victoria Catroppa</h1>
    <p class="subtitle">Graphic Designer</p>

    <div class="links-container">
      <a href="https://www.instagram.com/" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://www.behance.net/" class="btn"><i class="fab fa-behance"></i> Behance</a>
      <a href="https://www.linkedin.com/" class="btn"><i class="fab fa-linkedin"></i> LinkedIn</a>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Victoria Catroppa. All rights reserved.</p>
  </footer>
</body>
</html>
