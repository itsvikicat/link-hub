<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victoria Catroppa</title>

  <!-- Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome per le icone social -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }

    h1 {
      margin-bottom: 30px;
      color: #5e2ca5;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
      padding: 15px 35px;
      background: #c8a2ff; /* lilla chiaro */
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 18px;
      border-radius: 25px; /* bordi stondati */
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn:hover {
      background: #b38fff; /* leggermente più scuro al passaggio del mouse */
      transform: translateY(-2px);
      box-shadow: 0 6px 10px rgba(0,0,0,0.15);
    }

    .btn i {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <h1>Victoria Catroppa</h1>

  <a href="https://www.instagram.com/" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
  <a href="https://www.behance.net/" class="btn"><i class="fab fa-behance"></i> Behance</a>
  <a href="https://www.linkedin.com/" class="btn"><i class="fab fa-linkedin"></i> LinkedIn</a>

</body>
</html>
