<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Victoria Catroppa, graphic designer. Brand identity, editoria e contenuti digitali.">
  <meta name="author" content="Victoria Catroppa">
  <meta property="og:title" content="Victoria Catroppa - Portfolio">
  <meta property="og:description" content="Brand identity, editoria e contenuti digitali.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://itsvikicat.github.io/link-hub/">
  <meta property="og:image" content="https://itsvikicat.github.io/link-hub/og-image.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Victoria Catroppa - Portfolio">
  <meta name="twitter:description" content="Brand identity, editoria e contenuti digitali.">
  <meta name="twitter:image" content="https://itsvikicat.github.io/link-hub/og-image.svg">
  <meta name="theme-color" content="#ffffff">

  <title>Victoria Catroppa - Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="brand-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="brand-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fff;
      --ink: #141014;
      --pink: #ff4fa0;
      --button: #ff8fc4;
      --button-hover: #ffaed4;
      --soft: #ffe9f3;
      --shadow: 0 10px 26px rgba(184, 64, 123, 0.12);
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 18px;
    }

    main {
      width: min(100%, 390px);
      text-align: center;
    }

    .logo,
    h1,
    .role,
    .description,
    .button,
    .contact {
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 620ms ease forwards;
    }

    .logo {
      width: clamp(62px, 16vw, 74px);
      height: auto;
      display: block;
      margin: 0 auto 26px;
      animation-delay: 70ms;
    }

    h1 {
      color: var(--ink);
      font-size: clamp(1.82rem, 8vw, 2.42rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0;
      margin-bottom: 10px;
      animation-delay: 180ms;
    }

    .role {
      color: var(--pink);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 12px;
      animation-delay: 280ms;
    }

    .role::after {
      content: "";
      width: min(210px, 62vw);
      height: 3px;
      display: block;
      margin: 12px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pink), rgba(255, 255, 255, 0));
    }

    .description {
      max-width: 320px;
      margin: 0 auto 24px;
      font-size: 0.94rem;
      line-height: 1.45;
      font-weight: 500;
      animation-delay: 390ms;
    }

    .links {
      display: grid;
      gap: 11px;
      margin-bottom: 24px;
    }

    .button {
      min-height: 48px;
      padding: 11px 20px;
      border-radius: 999px;
      background: var(--button);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.96rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(184, 64, 123, 0.09);
      transition: transform 220ms ease, background 220ms ease, box-shadow 220ms ease;
    }

    .button:nth-child(1) {
      animation-delay: 520ms;
    }

    .button:nth-child(2) {
      animation-delay: 630ms;
    }

    .button:nth-child(3) {
      animation-delay: 740ms;
    }

    .button:hover {
      background: var(--button-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .button:focus-visible {
      outline: 3px solid var(--pink);
      outline-offset: 4px;
    }

    .button i {
      font-size: 1.18rem;
      transition: transform 220ms ease;
    }

    .button:hover i {
      transform: rotate(-10deg) scale(1.08);
    }

    .contact {
      width: min(100%, 292px);
      margin: 0 auto;
      padding: 13px 16px;
      border-radius: 18px;
      background: var(--soft);
      box-shadow: 0 6px 16px rgba(184, 64, 123, 0.08);
      animation-delay: 880ms;
    }

    .contact p {
      margin-bottom: 10px;
      font-size: 0.84rem;
      line-height: 1.35;
      font-weight: 500;
    }

    .email {
      min-height: 44px;
      padding: 11px 18px;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(184, 64, 123, 0.08);
      transition: transform 220ms ease, color 220ms ease, box-shadow 220ms ease;
    }

    .email:hover {
      color: var(--pink);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(184, 64, 123, 0.12);
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      h1,
      .role,
      .description,
      .button,
      .contact {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 26px 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="brand-icon.png" alt="Vikenike Design">

    <h1>Victoria Catroppa</h1>
    <p class="role">Graphic Designer</p>
    <p class="description">Brand identity, editoria e contenuti digitali.</p>

    <nav class="links" aria-label="Link social">
      <a class="button" href="https://www.behance.net/victoricatropp" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-behance" aria-hidden="true"></i> Behance
      </a>
      <a class="button" href="https://www.instagram.com/victoriacatroppadesign/" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-instagram" aria-hidden="true"></i> Instagram
      </a>
      <a class="button" href="https://www.linkedin.com/in/victoria-catroppa-08a5a2292/" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-linkedin" aria-hidden="true"></i> LinkedIn
      </a>
    </nav>

    <section class="contact" aria-label="Contatto email">
      <p>Per progetti e collaborazioni</p>
      <a class="email" href="mailto:victoriacatroppa@gmail.com">
        <i class="fas fa-envelope" aria-hidden="true"></i> Contattami
      </a>
    </section>
  </main>
</body>
</html>
